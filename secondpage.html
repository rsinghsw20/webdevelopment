<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_14 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_14" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_14');
  const devicePixelRatio = window.devicePixelRatio || 1;

const container = document.querySelector('#checkmark-container');
const width = container.clientWidth || 300;
const height = container.clientHeight || 300;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
container.appendChild(renderer.domElement);

// Create a checkmark using shapes
const checkShape = new THREE.Shape();
checkShape.moveTo(-0.5, 0);
checkShape.lineTo(-0.2, -0.3);
checkShape.lineTo(0.5, 0.4);

const extrudeSettings = { depth: 0.1, bevelEnabled: true, bevelThickness: 0.05, bevelSize: 0.05 };
const geometry = new THREE.ExtrudeGeometry(checkShape, extrudeSettings);
const material = new THREE.MeshPhongMaterial({ color: 0x4f46e5, shininess: 100 });
const checkmark = new THREE.Mesh(geometry, material);
scene.add(checkmark);

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(1, 1, 2);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

camera.position.z = 2;

function animate() {
  requestAnimationFrame(animate);
  checkmark.rotation.y += 0.01;
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  const w = container.clientWidth || window.innerWidth;
  const h = container.clientHeight || window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
});

animate();

})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_14 -->
</body>
</html>
