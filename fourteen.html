<script>
        // Password Strength Logic
        const passwordInput = document.getElementById('new-password');
        const segments = document.querySelectorAll('[data-segment]');
        const label = document.getElementById('strength-label');

        passwordInput.addEventListener('input', (e) => {
            const val = e.target.value;
            let strength = 0;

            if (val.length >= 8) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            if (/[^A-Za-z0-9]/.test(val)) strength++;

            // Reset
            segments.forEach(s => s.className = 'h-1.5 flex-1 rounded-full bg-surface-container-high transition-colors duration-500');

            // Apply colors based on strength
            const colors = ['bg-error', 'bg-tertiary-fixed-dim', 'bg-secondary-fixed-dim', 'bg-secondary'];
            const labels = ['Too weak', 'Low', 'Fair', 'Strong', 'Excellent'];

            for (let i = 0; i < strength; i++) {
                segments[i].classList.remove('bg-surface-container-high');
                segments[i].classList.add(colors[strength - 1]);
            }

            label.textContent = `Security strength: ${labels[strength]}`;
            label.className = `font-label-sm text-label-sm mt-xs ${strength > 0 ? 'text-' + colors[strength-1].replace('bg-', '') : 'text-on-surface-variant'}`;
        });

        // Form Submit Interaction
        const form = document.getElementById('reset-form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = form.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;

            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span> Updating...';

            // Simulating success
            setTimeout(() => {
                btn.classList.replace('bg-primary', 'bg-secondary');
                btn.innerHTML = '<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span> Password Updated';

                setTimeout(() => {
                    alert('Password has been reset successfully. Redirecting to login...');
                    // In a real app: window.location.href = '/login';
                }, 1000);
            }, 1500);
        });

        // Simple visibility toggles
        document.querySelectorAll('button .material-symbols-outlined[data-icon="visibility"]').forEach(btnIcon => {
            btnIcon.parentElement.addEventListener('click', () => {
                const input = btnIcon.closest('.relative').querySelector('input');
                if (input.type === 'password') {
                    input.type = 'text';
                    btnIcon.innerText = 'visibility_off';
                } else {
                    input.type = 'password';
                    btnIcon.innerText = 'visibility';
                }
            });
        });
    </script>
