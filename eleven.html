<style>
        body {

            background-color: #f1f5f9; /* Light gray background specified in prompt */

<body class="min-h-screen flex items-center justify-center p-gutter">
<!-- Main Content Canvas -->
<main class="w-full flex justify-center">
<!-- Centered Card -->
<div class="bg-surface-container-lowest w-full max-w-[400px] rounded-xl shadow-sm p-xxl flex flex-col items-center text-center transition-all duration-300 hover:shadow-lg">
<!-- Success Icon Container -->
<div class="mb-xl w-16 h-16 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined !text-[40px]" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<!-- Heading -->
<h1 class="font-headline-md text-headline-md text-on-surface mb-sm">
                Check your inbox
            </h1>
<!-- Subtext -->
<p class="font-body-md text-body-md text-on-surface-variant mb-xl px-sm">
                We've sent a link to <span class="font-semibold text-on-surface">user@example.com</span>. It expires in 15 minutes.
            </p>
<!-- Action Buttons Area -->
<div class="w-full space-y-md">
<!-- Back to Sign In Link (Implicit UX) -->
<a class="inline-flex items-center gap-xs font-label-md text-label-md text-primary hover:text-on-primary-fixed-variant transition-colors group" href="#">
<span class="material-symbols-outlined !text-[18px] group-hover:-translate-x-1 transition-transform" data-icon="arrow_back">arrow_back</span>
                    Back to Sign In
                </a>
<!-- Resend Section -->
<div class="pt-xl border-t border-outline-variant w-full">
<p class="font-label-md text-label-md text-outline mb-sm">Didn't receive an email?</p>
<button class="w-full flex items-center justify-center gap-sm px-lg py-sm rounded-lg bg-surface-container-high text-outline font-title-md transition-all cursor-not-allowed" disabled="" id="resendButton">
<span class="material-symbols-outlined !text-[20px]" data-icon="refresh">refresh</span>
                        Resend
                        <span class="ml-auto font-mono text-label-md tabular-nums bg-surface-container-highest px-sm py-0.5 rounded" id="timer">30s</span>
</button>
</div>
</div>
</div>
</main>
<!-- Footer Segment (Suppressed full footer as per Task-Focused/Transactional rule, but keeping branding) -->
<div class="fixed bottom-xl left-1/2 -translate-x-1/2 text-center w-full">
<p class="font-label-md text-label-md text-outline">
            © 2024 ScholarPath. All rights reserved.
        </p>
</div>
<!-- Micro-interactions Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const resendButton = document.getElementById('resendButton');
            const timerDisplay = document.getElementById('timer');
            let timeLeft = 30;

            const updateTimer = () => {
                if (timeLeft > 0) {
                    timeLeft--;
                    timerDisplay.textContent = `${timeLeft}s`;
                    setTimeout(updateTimer, 1000);
                } else {
                    // Re-enable state
                    resendButton.disabled = false;
                    resendButton.classList.remove('bg-surface-container-high', 'text-outline', 'cursor-not-allowed');
                    resendButton.classList.add('bg-primary-container', 'text-on-primary', 'hover:bg-primary', 'active:scale-95', 'cursor-pointer', 'shadow-sm');
                    timerDisplay.style.display = 'none';
                }
            };

            // Start countdown
            updateTimer();

            // Handle resend click
            resendButton.addEventListener('click', () => {
                if (!resendButton.disabled) {
                    // Reset visual state
                    timeLeft = 30;
                    timerDisplay.style.display = 'inline-block';
                    timerDisplay.textContent = `30s`;
                    resendButton.disabled = true;
                    resendButton.classList.add('bg-surface-container-high', 'text-outline', 'cursor-not-allowed');
                    resendButton.classList.remove('bg-primary-container', 'text-on-primary', 'hover:bg-primary', 'active:scale-95', 'shadow-sm');

                    // Logic to simulate re-sending
                    console.log('Resending verification email...');
                    updateTimer();
                }
            });
        });
    </script>
