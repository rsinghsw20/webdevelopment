<body class="min-h-screen flex items-center justify-center bg-surface p-margin-mobile">

<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary-fixed blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] rounded-full bg-secondary-fixed blur-[100px]"></div>
</div>
<!-- Main Content Container -->
<main class="relative z-10 w-full max-w-[400px]">
<!-- Logo/Brand Anchor (Semantic Header) -->
<div class="flex flex-col items-center mb-xl">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center mb-md shadow-lg">
<span class="material-symbols-outlined text-on-primary text-[28px]" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">ScholarPath</h1>
</div>
<!-- Forgot Password Card -->
<section class="glass-card rounded-xl p-xl flex flex-col gap-lg border border-outline-variant/30">
<header class="text-center">
<h2 class="font-title-lg text-title-lg text-on-surface mb-xs">Reset your password</h2>
<p class="font-body-md text-body-md text-on-surface-variant">
                    Enter your email and we'll send a reset link.
                </p>
</header>
<form class="flex flex-col gap-md" id="reset-form">
<!-- Email Input Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface ml-xs" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
<input class="w-full pl-[40px] pr-md py-[10px] rounded-lg border border-outline-variant bg-surface-container-lowest font-body-md text-body-md text-on-surface placeholder:text-outline/60 input-focus transition-all duration-200" id="email" name="email" placeholder="e.g. alex@university.edu" required="" type="email"/>
</div>
</div>
<!-- Action Button -->
<button class="group relative w-full bg-primary text-on-primary py-md px-lg rounded-lg font-title-md text-title-md btn-shadow hover:bg-primary-container active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-sm" type="submit">
<span>Send reset link</span>
<span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Navigation Links -->
<footer class="mt-md border-t border-outline-variant/20 pt-md text-center">
<a class="inline-flex items-center gap-xs font-label-md text-label-md text-primary hover:text-primary-container transition-colors group" href="#">
<span class="material-symbols-outlined text-[16px] group-hover:-translate-x-1 transition-transform">arrow_back</span>

</a>

<!-- Success Message Toast (Hidden by default) -->
<div class="fixed bottom-xl left-1/2 -translate-x-1/2 translate-y-20 opacity-0 bg-secondary text-on-secondary px-lg py-md rounded-full shadow-xl flex items-center gap-sm transition-all duration-500 pointer-events-none" id="success-toast">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<p class="font-label-md text-label-md">Check your inbox! Reset link has been sent.</p>
</div>
<!-- Interaction Script -->
<script>
        document.getElementById('reset-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;

            // Loading state
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-spin material-symbols-outlined">progress_activity</span>`;

            setTimeout(() => {
                // Success state
                btn.innerHTML = originalText;
                btn.disabled = false;

                const toast = document.getElementById('success-toast');
                toast.classList.remove('translate-y-20', 'opacity-0');
                toast.classList.add('translate-y-0', 'opacity-100');

                setTimeout(() => {
                    toast.classList.add('translate-y-20', 'opacity-0');
                    toast.classList.remove('translate-y-0', 'opacity-100');
                }, 4000);
            }, 1200);
        });
    </script>
